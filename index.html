<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="src/style.scss" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>witze-app</title>
  </head>
  <body>
    <div class="app">
      <h1 class="heading">Witze App</h1>
      <div class="joke">
        <p class="joke__current-joke">
          Klicke auf Neuen Witz laden, um einen Witz anzuzeigen.
        </p>
        <div class="joke__category">
          <label for="category">Kategorie wählen:</label>
          <select class="joke__categories" id="category"></select>
        </div>
        <div class="joke__actions">
          <button id="getNewJoke" class="joke__btnNew">Neuen Witz laden</button>
          <button id="saveNewJoke" class="joke__btnSave">
            Witz speichern<svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="joke__icon"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <h2 class="sub-heading">Gespeicherte Witze</h2>
      <div class="saved-jokes"></div>

      <button class="toggle-dark-mode">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path
            d="M160 136c0-30.62 4.51-61.61 16-88C99.57 81.27 48 159.32 48 248c0 119.29 96.71 216 216 216 88.68 0 166.73-51.57 200-128-26.39 11.49-57.38 16-88 16-119.29 0-216-96.71-216-216z"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="32"
          />
        </svg>
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
